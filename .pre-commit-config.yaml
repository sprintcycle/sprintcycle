# SprintCycle pre-commit Hooks
# 版本: 1.0.0
# 更新: 2026-05-19

repos:
  # Ruff: Python Linter + Auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --select=E,F,I,W]
      - id: ruff-format
        args: [--check, --diff]

  # Pyright: Python Type Checker
  - repo: local
    hooks:
      - id: pyright
        name: Pyright Type Check
        entry: pyright
        language: system
        types: [python]
        pass_filenames: true

  # Trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
