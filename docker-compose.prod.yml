version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    image: ${BACKEND_IMAGE:-sprintcycle-backend:latest}
    environment:
      SPRINTCYCLE_ENV: ${SPRINTCYCLE_ENV:-production}
      SPRINTCYCLE_SERVICE: dashboard
      PROJECT_PATH: ${PROJECT_PATH:-/workspace}
      PYTHONUNBUFFERED: "1"
    volumes:
      - sprintcycle-data:${PROJECT_PATH:-/workspace}/.sprintcycle
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-sprintcycle-frontend:latest}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  sprintcycle-data:
