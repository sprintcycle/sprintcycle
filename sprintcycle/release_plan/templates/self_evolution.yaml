# SprintCycle 自进化计划模板
# 执行时仅依据 evolution.targets + goals/constraints，由编排器展开为标准 Sprint（architect → coder → tester → regression_tester）。

project:
  name: "sprintcycle"
  path: "/root/sprintcycle"
  version: "v0.6.0"

mode: "evolution"

evolution:
  targets:
    - "sprintcycle/evolution/engine.py"
    - "sprintcycle/evolution/client.py"
    - "sprintcycle/orchestration/sprint_orchestrator.py"
  goals:
    - "优化进化算法效率"
    - "提升代码可读性"
    - "减少内存占用"
  constraints:
    - "保持 API 兼容"
    - "测试全部通过"
    - "不影响现有功能"
  max_variations: 5
  iterations: 3

# 可为空；非空时仅作文档参考，执行阶段仍按 targets 重新展开
sprints: []
