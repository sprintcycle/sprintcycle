# 普通任务 PRD 模板
# 适用于：功能开发、代码优化、缺陷修复等常规任务

project:
  name: "项目名称"
  path: "/root/project-path"
  version: "v1.0.0"

mode: "normal"  # 执行模式: normal=普通任务, evolution=自进化模式

sprints:
  - name: "Sprint 1: 需求实现"
    goals:
      - "完成核心功能开发"
      - "保证代码质量"
    tasks:
      - task: |
          实现用户登录功能
          - 支持用户名密码登录
          - 登录失败错误提示
          - 记住登录状态
        agent: "coder"
        target: "src/auth/login.py"
        constraints:
          - "使用现有的错误处理机制"
          - "保持 API 兼容"

      - task: |
          实现数据导出功能
        agent: "coder"
        target: "src/export/"
        timeout: 1200

  - name: "Sprint 2: 测试验证"
    goals:
      - "确保功能正确性"
    tasks:
      - task: |
          编写登录功能单元测试
        agent: "tester"
        target: "tests/test_login.py"
        constraints:
          - "测试覆盖率 > 80%"

      - task: |
          执行集成测试
        agent: "tester"
        timeout: 1800
