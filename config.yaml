# SprintCycle 配置 - 分层处理

analysis:
  enabled: true
  
  # Ruff 配置（最快的 Python Linter）
  ruff:
    enabled: true
    rules: ["E", "F", "W", "I", "UP", "B", "C4"]
    fix: true
  
  # MyPy 配置
  mypy:
    enabled: true
    strict: false
    ignore_missing_imports: true
  
  # LLM 分析（复杂问题）
  llm_fallback:
    enabled: true
    model: "gpt-4"
    max_tokens: 2000

  # 自动修复
  auto_fix:
    enabled: true
    confidence_threshold: 0.9
