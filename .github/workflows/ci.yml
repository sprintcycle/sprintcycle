name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-gate:
    name: architecture-gate (G4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install backend dev dependencies
        run: uv sync --frozen --extra dev
      - name: Import linter contracts
        run: uv run lint-imports

  backend-checks:
    name: backend-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install backend dev dependencies
        run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check sprintcycle tests
      - name: Pytest
        run: uv run pytest tests/ -q --tb=short

  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify canonical dev-setup path (V4.0 §6.1)
        run: test -f docs-dev/dev-setup.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dashboard frontend
        working-directory: frontend
        run: npm ci
      - name: Sync dashboard OpenAPI → TypeScript
        working-directory: frontend
        run: npm run openapi:sync
      - name: Build dashboard frontend
        working-directory: frontend
        run: npm run build
      - name: Frontend ESLint
        working-directory: frontend
        run: npm run lint

  playwright:
    name: playwright (dashboard smoke)
    runs-on: ubuntu-latest
    needs: frontend-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dashboard frontend
        working-directory: frontend
        run: npm ci
      - name: Build dashboard frontend
        working-directory: frontend
        run: npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Playwright smoke tests
        working-directory: frontend
        run: npx playwright test
