name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,dashboard]"
      - name: Ruff check
        run: pip install ruff && ruff check sprintcycle tests
      - name: Pytest
        run: python -m pytest tests/ -q --tb=short
      - name: Import linter (L3)
        run: lint-imports
