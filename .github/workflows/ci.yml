name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  architecture-gate:
    name: architecture-gate (G4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtual environment
        run: python -m venv .venv
      - name: Install
        run: .venv/bin/python -m pip install -e "[dev]"
      - name: Import linter contracts
        run: .venv/bin/lint-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify canonical dev-setup path (V4.0 §6.1)
        run: test -f docs-dev/dev-setup.sh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtual environment
        run: python -m venv .venv
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: .venv/bin/python -m pip install -e "[dev,dashboard]"
      - name: Install dashboard frontend
        working-directory: frontend
        run: npm ci
      - name: Sync dashboard OpenAPI → TypeScript
        working-directory: frontend
        run: npm run openapi:sync
      - name: Build dashboard frontend
        working-directory: frontend
        run: npm run build
      - name: Ruff check
        run: .venv/bin/python -m pip install ruff && .venv/bin/python -m ruff check sprintcycle tests
      - name: Pytest
        run: .venv/bin/python -m pytest tests/ -q --tb=short
      - name: Frontend ESLint
        working-directory: frontend
        run: npm run lint
      - name: Playwright (dashboard smoke)
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          npx playwright test
