version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sprintcycle:latest
    environment:
      SPRINTCYCLE_SERVICE: api
      SPRINTCYCLE_ENV: production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: sprintcycle:latest
    environment:
      SPRINTCYCLE_SERVICE: dashboard
      SPRINTCYCLE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
