[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sprintcycle"
version = "0.9.2"
description = "PRD驱动的自我进化敏捷开发框架"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "litellm>=1.0.0",
    "diskcache>=5.0.0",
    "tenacity>=8.0.0",
    "sqlalchemy>=2.0.0",
]

[project.optional-dependencies]
# Web Dashboard 与远程观测（与技术选型表一致）
dashboard = [
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.23.0",
    "httpx>=0.25.0",
    "loguru>=0.7.0",
]
# 完整栈：在 dashboard 之外显式列出常用项，便于文档与 CI 一条命令安装
full = [
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.23.0",
    "httpx>=0.25.0",
    "loguru>=0.7.0",
]
# SSE transport for remote agent access (uvicorn for HTTP server, starlette for ASGI)
mcp-sse = ["uvicorn>=0.23.0", "starlette>=0.27.0"]
# Development dependencies
dev = [
    "mypy>=1.0.0",
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "import-linter>=2.0",
]

[project.scripts]
sprintcycle = "sprintcycle.cli:cli"

[tool.setuptools.packages.find]
include = ["sprintcycle*"]

[tool.mypy]
ignore_missing_imports = true
python_version = "3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.importlinter]
root_package = "sprintcycle"

[[tool.importlinter.contracts]]
name = "API 层不得依赖 dashboard（G4 / L3 最小门禁）"
type = "forbidden"
source_modules = [
    "sprintcycle.api",
]
forbidden_modules = [
    "sprintcycle.dashboard",
]

[[tool.importlinter.contracts]]
name = "调度层不得依赖 dashboard"
type = "forbidden"
source_modules = [
    "sprintcycle.scheduler",
]
forbidden_modules = [
    "sprintcycle.dashboard",
]
