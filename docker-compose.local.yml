version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    image: sprintcycle-backend:local
    environment:
      SPRINTCYCLE_ENV: development
      SPRINTCYCLE_SERVICE: dashboard
      PROJECT_PATH: /workspace
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
      - sprintcycle-data:/workspace/.sprintcycle
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sprintcycle-frontend:local
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  sprintcycle-data:
