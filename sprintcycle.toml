# SprintCycle 本仓库默认配置（可被环境变量 SPRINTCYCLE_* 覆盖）

[project]
path = "."
parallel_tasks = 3
max_sprints = 10

[quality]
level = "L2"
min_coverage_percent = 80.0

[execution]
max_verify_fix_rounds = 3
event_backend = "memory"   # memory | sqlite（默认 sqlite：本地持久化执行事件）

[engine]
name = "aider"

[llm]
provider = "deepseek"
model = "deepseek-reasoner"

[storage]
backend = "sqlite"
state_dir = ".sprintcycle/state"
sqlite_path = ".sprintcycle/data/sprintcycle.db"

# 执行缓存：默认本地 diskcache；详见 docs/CACHE.md
[cache]
enabled = true
backend = "diskcache"
dir = ".sprintcycle/cache"
# 改用 Redis（需 pip install -e ".[cache-redis]"）时取消下面注释并改 backend：
# backend = "redis"
# redis_url = "redis://localhost:6379/0"
# 完全关闭缓存：enabled = false

[governance]
enabled = true
block_on = "none"
downgrade_errors_to_warnings = true
run_static = true
run_import_linter = true
check_adr = false
check_compose = false

# 人机卡点（HITL）：在 Sprint/任务边界阻塞等待人工决策；详见 docs/QUICKSTART.md「人机卡点 HITL」
[hitl]
enabled = false
gates = "before_sprint"
default_timeout_seconds = 300
timeout_behavior = "approve"
after_task_on_failure = true
after_sprint_always = false
# db_path = ".sprintcycle/hitl.db"
