# Codecov Configuration for SprintCycle
# See https://docs.codecov.io/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"
  
  status:
    project:
      default:
        # 目标覆盖率 70%
        target: 70%
        # 允许的误差范围
        threshold: 5%
        # 只有 PR 才能拉低覆盖率
        only_pulls: false
        flags:
          unittests:
            paths:
              - tests/
    patch:
      default:
        target: 70%
        threshold: 5%
        only_pulls: false

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes

flags:
  unittests:
    paths:
      - tests/
    carryforward: true
